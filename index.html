<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Tech News</title>
  <link rel="stylesheet" href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #0d1117;
      color: #c9d1d9;
    }
    h1 {
      color: #58a6ff;
      border-bottom: 1px solid #30363d;
      padding-bottom: 10px;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 10px 24px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #c9d1d9;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }
    .tab-btn:hover {
      background: #1c2333;
    }
    .tab-btn.active {
      background: #1f6feb;
      border-color: #1f6feb;
      color: #fff;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .last-updated {
      color: #8b949e;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .gridjs-wrapper {
      overflow-x: auto;
    }
    footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #30363d;
      color: #8b949e;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>📰 Daily Tech News</h1>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('security')">🔒 Security</button>
    <button class="tab-btn" onclick="switchTab('ai')">🤖 AI</button>
    <button class="tab-btn" onclick="switchTab('sre')">⚙️ SRE</button>
  </div>

  <div id="tab-security" class="tab-content active">
    <div class="last-updated" id="updated-security"></div>
    <div id="grid-security"></div>
  </div>
  <div id="tab-ai" class="tab-content">
    <div class="last-updated" id="updated-ai"></div>
    <div id="grid-ai"></div>
  </div>
  <div id="tab-sre" class="tab-content">
    <div class="last-updated" id="updated-sre"></div>
    <div id="grid-sre"></div>
  </div>

  <script src="https://unpkg.com/gridjs/dist/gridjs.production.min.js"></script>
  <script>
    async function loadCategory(category, file, gridId, updatedId) {
      try {
        const resp = await fetch(file);
        const data = await resp.json();
        document.getElementById(updatedId).textContent = `更新時間: ${data.updated || 'N/A'}`;
        new gridjs.Grid({
          columns: [
            { name: '標題', width: '70%', formatter: (cell, row) => gridjs.html(`<a href="${row.cells[1].data}" target="_blank" style="color:#58a6ff;text-decoration:none;">${cell}</a>`) },
            { name: '來源', width: '30%', formatter: (cell) => gridjs.html(`<span style="color:#8b949e;">${cell}</span>`) }
          ],
          data: data.items.map(item => [item.title, item.url, item.source]),
          sort: false,
          search: true,
          pagination: { enabled: true, limit: 30 },
          style: {
            table: { 'font-size': '14px' },
            th: { 'background': '#161b22', 'color': '#c9d1d9', 'border-color': '#30363d' },
            td: { 'border-color': '#30363d' }
          }
        }).render(document.getElementById(gridId));
      } catch(e) {
        document.getElementById(gridId).innerHTML = `<p style="color:#f85149;">載入失敗: ${e.message}</p>`;
      }
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelector(`.tab-btn[onclick*="'${tab}'"]`).classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');
    }

    // 載入各分類
    loadCategory('security', 'data/security.json', 'grid-security', 'updated-security');
    loadCategory('ai', 'data/ai.json', 'grid-ai', 'updated-ai');
    loadCategory('sre', 'data/sre.json', 'grid-sre', 'updated-sre');
  </script>

  <footer>
    <p>Powered by Hermes Agent &middot; Built with <a href="https://gridjs.io/" target="_blank" style="color:#58a6ff;">Grid.js</a> (MIT License)</p>
    <p>Data collected from GitHub Trending, DeepLearning.ai The Batch, Hacker News, SRE Weekly, iThome, 資安人</p>
    <p>版權聲明: 所有新聞內容與標題分別屬於其各自來源。本頁面僅為自動化彙整，不承擔內容責任。</p>
  </footer>
</body>
</html>
